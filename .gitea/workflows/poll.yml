name: poll

on:
  schedule:
    # seats.aero Pro tier = 1000 calls/calendar day, resets midnight UTC.
    # One cycle = ~72 search calls (windows × routes × directions), so the daily
    # budget caps us at ~13 cycles/day across all matrix entries combined. Every 2
    # hours = 12 cycles/day per region, leaving headroom for /trips enrichment.
    - cron: "0 */2 * * *"
  workflow_dispatch:

env:
  S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  S3_PREFIX: ${{ vars.S3_PREFIX || 'award-flight-researcher' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: echo "matrix=${{ vars.POLL_MATRIX }}" >> "$GITHUB_OUTPUT"

  poll:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.setup.outputs.matrix) }}
    concurrency:
      group: poll-${{ matrix.region.name }}
      cancel-in-progress: false
    env:
      DB_PATH: data/${{ matrix.region.db }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install mc (MinIO client)
        run: |
          curl -sSLo /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /usr/local/bin/mc
          mc alias set homelab "$S3_ENDPOINT" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Fetch config from MinIO
        run: |
          mc cp "homelab/$S3_BUCKET/$S3_PREFIX/${{ matrix.region.search }}" config/search.yaml
          mc cp "homelab/$S3_BUCKET/$S3_PREFIX/balances.yaml"               config/balances.yaml

      - name: Fetch sqlite DB from MinIO (ok if missing on first run)
        run: |
          mkdir -p "$(dirname "$DB_PATH")"
          mc cp "homelab/$S3_BUCKET/$S3_PREFIX/${{ matrix.region.db }}" "$DB_PATH" || \
            echo "no existing DB in MinIO — starting fresh"

      - name: uv sync
        run: ~/.local/bin/uv sync

      - name: init-db (idempotent)
        run: ~/.local/bin/uv run researcher init-db
        env:
          SEATSAERO_API_KEY: ${{ secrets.SEATSAERO_API_KEY }}
          RESEARCHER_DB_PATH: ${{ env.DB_PATH }}

      - name: run-once
        run: ~/.local/bin/uv run researcher run-once
        env:
          SEATSAERO_API_KEY: ${{ secrets.SEATSAERO_API_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          RESEARCHER_DB_PATH: ${{ env.DB_PATH }}

      - name: Push sqlite DB back to MinIO
        run: mc cp "$DB_PATH" "homelab/$S3_BUCKET/$S3_PREFIX/${{ matrix.region.db }}"
